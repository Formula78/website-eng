<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">

    <input type="email" name="email" placeholder="Deine E-Mail" data-i18n-placeholder="contact-email-placeholder" required>

    <textarea name="message" rows="6" placeholder="Deine Nachricht" data-i18n-placeholder="contact-message-placeholder" required></textarea>

    <button type="submit" data-i18n="contact-submit">Senden</button>

  </form>

  <p data-i18n="contact-or">oder direkt:</p>
